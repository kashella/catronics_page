<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catronics Lab — Calculadoras</title>
<meta name="description" content="Calculadoras de electrónica: resistencias, Ley de Ohm, RC, baterías, AWG y más." />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" type="image/png" href="/catronics-cat-white.png">
</head>
<body>

<div class="noise" aria-hidden="true"></div>
<div id="app-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- i18n must load before any component that uses useT / t / tx -->
<script type="text/babel" src="../i18n.js"></script>

<!-- shell first, then calculators -->
<script type="text/babel" src="ToolShell.jsx"></script>
<script type="text/babel" src="BasicCalcs.jsx"></script>
<script type="text/babel" src="ColorCodes.jsx"></script>
<script type="text/babel" src="AdvancedCalcs.jsx"></script>

<script type="text/babel">
  function App() {
    const [active, setActive] = React.useState("resistor4");
    const renderTool = () => {
      switch (active) {
        case "ohms":      return <OhmsTool />;
        case "divider":   return <DividerTool />;
        case "led":       return <LedTool />;
        case "reactance": return <ReactanceTool />;
        case "rctc":      return <RCTool />;
        case "parallel":  return <ParallelTool />;
        case "battery":   return <BatteryTool />;
        case "ppm":       return <PpmTool />;
        case "awg":       return <AwgTool />;
        case "decfrac":   return <DecFracTool />;
        case "resistor4": return <Resistor4Tool />;
        case "resistor5": return <Resistor5Tool />;
        case "inductor":  return <InductorTool />;
        case "smd":       return <SmdTool />;
        case "capcode":   return <CapCodeTool />;
        case "convert":   return <ConvertTool />;
        default: return <Placeholder glyph="?" />;
      }
    };
    return (
      <ToolShell tools={TOOLS} activeId={active} onPick={setActive}>
        {renderTool()}
      </ToolShell>
    );
  }
  ReactDOM.createRoot(document.getElementById("app-root")).render(<App />);
</script>

</body>
</html>
