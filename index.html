<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- i18n first — all components depend on useT / t / tx -->
<script type="text/babel" src="../i18n.js"></script>

<!-- Primitives before any feature component -->
<script type="text/babel" src="Primitives.jsx"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Dividers.jsx"></script>

<script type="text/babel" src="Team.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>

<script type="text/babel">
  function App() {
    const scrollToContact = () => {
      document.getElementById("contacto")?.scrollIntoView({ behavior: "smooth" });
    };
    return (
      <React.Fragment>
        <Nav onCtaClick={scrollToContact} />
        <main>
          <Hero />
          <SchematicDivider />
          <ServicesSection />
          <Marquee />
          <ProcessSection />
          <TeamSection />
          <ContactSection />
        </main>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
